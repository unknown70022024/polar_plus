name: Polar Plus Pipeline

on:
  schedule:
    # Every 3 hours, at 7 minutes past the hour (offset to avoid peak)
    - cron: '7 */3 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pillow xarray netCDF4 h5netcdf fsspec

      - name: Run polar_plus cloud pipeline
        run: python -m polar_plus.run
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
          GH_PAGES_BASE: ${{ vars.GH_PAGES_BASE }}

      - name: Fetch Blitzortung storm data
        run: python polar_plus/fetch_storms.py
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/latest

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
