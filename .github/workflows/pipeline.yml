name: Polar Plus Pipeline

on:
  schedule:
    # Every 3 hours, at 7 minutes past the hour (offset to avoid peak)
    - cron: '7 */3 * * *'
  workflow_dispatch:  # Manual trigger for testing

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 numpy pillow xarray netCDF4 h5netcdf

      - name: Run polar_plus cloud pipeline
        run: python -m polar_plus.run
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
          # GitHub Pages URL — built automatically from repo info.
          # Override with GH_PAGES_BASE if using a custom domain.
          GH_PAGES_BASE: ${{ vars.GH_PAGES_BASE }}

      - name: Fetch Blitzortung storm data
        run: python polar_plus/fetch_storms.py
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output
          # Set BLITZORTUNG_AUTH as repository secret for live lightning data.
          # Format: username:password
          # Leave unset to use default placeholder locations.
          BLITZORTUNG_AUTH: ${{ secrets.BLITZORTUNG_AUTH }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: output/latest
          keep_files: false
          force_orphan: true
          enable_jekyll: false
